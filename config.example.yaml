server:
  host: 0.0.0.0
  port: 8003
  debug: false
  log_level: info

cors:
  allow_origins:
    - http://127.0.0.1
    - http://localhost
    - http://127.0.0.1:3000
    - http://localhost:3000
    - http://127.0.0.1:5173
    - http://localhost:5173

jwt_secret_key: CHANGE_ME_TO_A_LONG_RANDOM_SECRET

admin:
  api_key: CHANGE_ME_TO_A_LONG_RANDOM_ADMIN_TOKEN

system_prompt: |
  你是 LFBot，一个温柔、自然、会陪伴聊天的 AI 助手。

# 功能协议层（与人设分离，系统维护，用户一般不需要修改）
# 支持每用户独立配置：user_data/{username}/system_rules.md 优先于此全局配置
# 留空则不注入任何功能协议
system_rules: ""

llm:
  provider: openai
  api_base: https://api.openai.com/v1
  api_key: ""
  model: gpt-4o-mini
  temperature: 0.7
  max_tokens: 2000
  openai:
    api_base: https://api.openai.com/v1
    api_key: ""
    model: gpt-4o-mini
  siliconflow:
    api_base: https://api.siliconflow.cn/v1
    api_key: ""
    model: deepseek-ai/DeepSeek-V3.2
  deepseek:
    api_base: https://api.deepseek.com/v1
    api_key: ""
    model: deepseek-chat
  qwen:
    api_base: https://dashscope.aliyuncs.com/compatible-mode/v1
    api_key: ""
    model: qwen-plus

daily_schedule_generation:
  # 是否启用 LLM 自动生成每日作息
  enabled: true
  # 每天在此时间窗口内触发生成（凌晨，避免打扰）
  generate_window_start: "00:00"
  generate_window_end: "06:00"
  # AI 人设信息（用于生成提示词）
  persona_name: 小馨
  persona_desc: 温柔黏人的大三外语系女生，异地恋，校园生活，爱撒娇，偶尔小脾气
  # 可选：覆盖默认提示词模板（留空则使用内置模板）
  prompt_template: ""
  # 可选：使用独立的 LLM 配置（留空则复用全局 llm 配置）
  # llm:
  #   provider: openai
  #   api_base: https://...
  #   api_key: sk-...
  #   model: gpt-4o-mini
  #   temperature: 0.9
  #   max_tokens: 2000

# Agent 委派配置 — 将任务委派给本地 Hermes Agent 执行
agent_delegate:
  enabled: false
  hermes:
    api_base: http://127.0.0.1:8642
    api_key: change-me-local-dev
    timeout: 300
    poll_interval: 3
    max_concurrent_tasks: 5
    instructions: |
      你是一个能干的助理。语气亲切自然，称呼用户"你"。
      任务结果该正式就正式（代码用代码块），但可以在开头结尾带一点温度。
      不要撒娇，不要用颜文字。简洁高效地完成任务。

adapters:
  console:
    enabled: false
  qq:
    enabled: false
    ws_url: ws://127.0.0.1:3001
    bot_qq: ""
    debounce:
      enabled: false
      delay: 3.0
      max_wait: 15.0
      separator: "\n"
    access_control:
      enabled: false
      mode: disabled
      whitelist: []
      blacklist: []
      deny_message: 抱歉，你没有权限使用此机器人。
  linyu:
    enabled: false
    base_url: http://127.0.0.1:8000
    account: ""
    password: ""
    debounce:
      enabled: false
      delay: 3.0
      max_wait: 15.0
      separator: "\n"

tts:
  enabled: false
  probability: 1.0
  proactive_enabled: true
  provider: qihang
  voice_only_when_tts: false
  qihang:
    api_key: ""
    base_url: https://api.qhaigc.net/v1
    voice: 柔情萝莉
  qwen:
    api_key: ""
    model: qwen-tts-latest
    voice: longxiaochun_v2
    base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
  segment_config:
    enabled: true
    max_segments: 1
    delay_range: [0.5, 2.0]
  randomization:
    enabled: false
  text_cleaning:
    enabled: true

asr:
  enabled: false
  provider: siliconflow
  siliconflow:
    api_key: ""
    api_base: https://api.siliconflow.cn/v1
    model: FunAudioLLM/SenseVoiceSmall
    timeout: 30
  qwen:
    api_key: ""
    api_base: https://dashscope.aliyuncs.com/compatible-mode/v1
    model: qwen3-asr-flash
    timeout: 30
  auto_send_to_llm: true
  processing_message: 正在识别语音...
  error_message: 语音识别失败，请稍后重试

image_generation:
  enabled: false
  provider: modelscope
  trigger_keywords:
    - 生成图片
    - 生图
    - 画
  modelscope:
    api_key: ""
    model: Tongyi-MAI/Z-Image-Turbo
    base_url: https://api-inference.modelscope.cn/v1
    timeout: 120
  yunwu:
    api_key: ""
    model: ""
    base_url: https://yunwu.ai/v1
  # Image API 本地服务配置（基于 Jimeng 即梦平台）
  image_api:
    api_base: "http://127.0.0.1:18081"  # 本地 Images API 服务地址
    api_key: ""  # API 密钥，为空时不发送认证头
    model: "jimeng-4.5"  # 支持: jimeng-4.5, jimeng-4.6, jimeng-5.0
    timeout: 120  # 请求超时时间（秒）
    ratio: "1:1"  # 图片比例
    resolution: "2k"  # 图片分辨率
    sample_strength: 0.5  # 图生图参考强度，范围 0.0-1.0
  # GPT-Image 中转站配置（仅支持图生图，计费 0.04 元/张）
  gpt_image:
    api_base: ""  # 中转站地址，如 https://your-proxy.com
    api_key: ""  # 中转站 API Key（Bearer Token）
    model: "gpt-image-2"  # 模型名称
    timeout: 180  # 请求超时时间（秒），gpt-image 生图较慢建议 ≥180
  # 默认兜底底图路径（当用户未上传底图时使用）
  default_base_image_path: "backend/data/default_base_image.jpg"

video_generation:
  enabled: false
  provider: video_api
  video_api:
    api_base: "http://127.0.0.1:18080"
    api_key: ""
    provider: qwen
    model: wan2.7-t2v
    timeout: 600
    ratio: "16:9"
    resolution: "1080P"
    duration: 5
    use_async: false
    poll_interval: 4
  trigger_keywords:
    - 生成视频
    - 做个视频
    - 做一段视频
    - 视频生成
    - 文生视频
  prompt_instruction: |
    用户刚刚明确提出了视频生成需求。你可以把用户需求整理成一段适合视频生成模型的中文提示词。
    如果确实要生成视频，只输出自然回复，并在末尾附加一段 [GEN_VIDEO: 提示词]。
    提示词应包含主体、动作、场景、镜头、风格、光线和时长感。
    不要在用户没有主动要求生成视频时使用 [GEN_VIDEO:]。
  generating_message: "🎬 正在为你生成视频，请稍候..."
  error_message: "😢 视频生成失败：{error}"
  success_message: "✨ 视频已生成完成！"

vision:
  enabled: false
  provider: modelscope
  auto_send_to_llm: true
  modelscope:
    api_key: ""
    model: Qwen/Qwen3-VL-30B-A3B-Instruct
    base_url: https://api-inference.modelscope.cn/v1
    timeout: 120

memory:
  short_term_enabled: true
  mid_term_enabled: true
  long_term_enabled: true
  short_term_max_rounds: 50
  summary_interval: 10
  max_summaries: 10
  rag_enabled: true
  rag_top_k: 3
  embedding_provider: local
  embedding_model: all-MiniLM-L6-v2
  pipeline_enabled: false
  summarizer_enabled: false

emotes:
  enabled: false
  send_probability: 0.25
  base_path: data/emotes
  max_per_message: 1
  categories: []

prompt_enhancer:
  enabled: false
  custom_word_bank_path: data/custom_prompt_words.yaml

cerebellum:
  enabled: false
  tick_interval: 30
  decay_rate: 0.008
  action_threshold: 0.52
  persistence_interval: 300
  state_file: data/cerebellum_state.json
  max_stimulus_step: 0.28
  history_limit: 2880
  replace_time_windows: true
  motivation_cooldown_seconds: 1800
  proactive_chat:
    enabled: false
    timezone: Asia/Shanghai
    check_interval_seconds: 60
    default_prompt: ""
    behavior_rules:
      enabled: true
      global_cooldown_seconds: 1800
      inactive_greeting:
        enabled: true
        after_seconds: 21600
        min_user_messages: 1
        instruction: ""
      conversation_follow_up:
        enabled: true
        after_seconds: 900
        min_user_messages: 1
        instruction: ""
    message_templates: []
    image_generation:
      enabled: false
      max_per_day: 3
    targets: []

reminder:
  enabled: true
  check_interval: 60

voice_gateway:
  enabled: false
